name: Build Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: source-dumper

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Tests (runs on every push/PR)
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --verbose

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

  # ──────────────────────────────────────────────
  # Linux x64
  # ──────────────────────────────────────────────
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-linux-

      - name: Build
        run: |
          cargo build --release
          mkdir -p dist
          cp target/release/${BINARY_NAME} dist/${BINARY_NAME}-linux-x64
          strip dist/${BINARY_NAME}-linux-x64
          chmod +x dist/${BINARY_NAME}-linux-x64
          cd dist && sha256sum ${BINARY_NAME}-linux-x64 > ${BINARY_NAME}-linux-x64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-x64
          path: |
            dist/${{ env.BINARY_NAME }}-linux-x64
            dist/${{ env.BINARY_NAME }}-linux-x64.sha256

  # ──────────────────────────────────────────────
  # Linux ARM64
  # ──────────────────────────────────────────────
  build-linux-arm64:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-linux-arm64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-linux-arm64-

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/${BINARY_NAME} dist/${BINARY_NAME}-linux-arm64
          aarch64-linux-gnu-strip dist/${BINARY_NAME}-linux-arm64 || true
          chmod +x dist/${BINARY_NAME}-linux-arm64
          cd dist && sha256sum ${BINARY_NAME}-linux-arm64 > ${BINARY_NAME}-linux-arm64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-arm64
          path: |
            dist/${{ env.BINARY_NAME }}-linux-arm64
            dist/${{ env.BINARY_NAME }}-linux-arm64.sha256

  # ──────────────────────────────────────────────
  # Windows x64
  # ──────────────────────────────────────────────
  build-windows:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-windows-

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
          rustup target add x86_64-pc-windows-gnu

      - name: Build
        run: |
          cargo build --release --target x86_64-pc-windows-gnu
          mkdir -p dist
          cp target/x86_64-pc-windows-gnu/release/${BINARY_NAME}.exe dist/${BINARY_NAME}-windows-x64.exe
          cd dist && sha256sum ${BINARY_NAME}-windows-x64.exe > ${BINARY_NAME}-windows-x64.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-windows-x64
          path: |
            dist/${{ env.BINARY_NAME }}-windows-x64.exe
            dist/${{ env.BINARY_NAME }}-windows-x64.exe.sha256

  # ──────────────────────────────────────────────
  # macOS (x64 + ARM64 via zigbuild)
  # ──────────────────────────────────────────────
  build-macos:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-macos-

      - name: Install targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Install Zig
        run: |
          wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar -xf zig-linux-x86_64-0.13.0.tar.xz
          sudo mv zig-linux-x86_64-0.13.0 /usr/local/zig
          echo "/usr/local/zig" >> $GITHUB_PATH

      - name: Install cargo-zigbuild
        run: |
          if ! command -v cargo-zigbuild &>/dev/null; then
            cargo install cargo-zigbuild
          fi

      - name: Build macOS x64
        run: |
          cargo zigbuild --release --target x86_64-apple-darwin
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/${BINARY_NAME} dist/${BINARY_NAME}-macos-x64
          chmod +x dist/${BINARY_NAME}-macos-x64
          cd dist && sha256sum ${BINARY_NAME}-macos-x64 > ${BINARY_NAME}-macos-x64.sha256

      - name: Build macOS ARM64
        run: |
          cargo zigbuild --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/${BINARY_NAME} dist/${BINARY_NAME}-macos-arm64
          chmod +x dist/${BINARY_NAME}-macos-arm64
          cd dist && sha256sum ${BINARY_NAME}-macos-arm64 > ${BINARY_NAME}-macos-arm64.sha256

      - name: Upload macOS x64
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-macos-x64
          path: |
            dist/${{ env.BINARY_NAME }}-macos-x64
            dist/${{ env.BINARY_NAME }}-macos-x64.sha256

      - name: Upload macOS ARM64
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-macos-arm64
          path: |
            dist/${{ env.BINARY_NAME }}-macos-arm64
            dist/${{ env.BINARY_NAME }}-macos-arm64.sha256

  # ──────────────────────────────────────────────
  # Create GitHub Release (only on tag push)
  # ──────────────────────────────────────────────
  create-release:
    needs: [build-linux, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            artifacts/source-dumper-linux-x64/*
            artifacts/source-dumper-linux-arm64/*
            artifacts/source-dumper-windows-x64/*
            artifacts/source-dumper-macos-x64/*
            artifacts/source-dumper-macos-arm64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}